<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C968"/>
      <stop offset="45%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6F2E"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#6A4F1C"/>
    </linearGradient>
  </defs>

  <!-- Shield outline (angular, pointed bottom) -->
  <g stroke="url(#goldGrad)" stroke-width="4" fill="none">
    <path d="M 60 50 L 240 50 L 240 175 L 200 225 L 150 260 L 100 225 L 60 175 Z"/>
    <path d="M 72 62 L 228 62 L 228 170 L 193 215 L 150 245 L 107 215 L 72 170 Z" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Left wing (3 feather segments) -->
  <g fill="url(#goldGrad)">
    <path d="M 150 75 L 110 80 L 95 110 L 140 105 Z"/>
    <path d="M 150 100 L 100 115 L 85 150 L 140 135 Z"/>
    <path d="M 150 130 L 95 155 L 90 200 L 145 170 Z"/>
    <path d="M 150 165 L 110 195 L 115 225 L 148 205 Z"/>
  </g>

  <!-- Right wing (mirror) -->
  <g fill="url(#goldGrad)">
    <path d="M 150 75 L 190 80 L 205 110 L 160 105 Z"/>
    <path d="M 150 100 L 200 115 L 215 150 L 160 135 Z"/>
    <path d="M 150 130 L 205 155 L 210 200 L 155 170 Z"/>
    <path d="M 150 165 L 190 195 L 185 225 L 152 205 Z"/>
  </g>

  <!-- T letter in center -->
  <g fill="url(#goldGrad)" stroke="url(#goldDark)" stroke-width="1.5">
    <rect x="105" y="58" width="90" height="14"/>
    <rect x="140" y="58" width="20" height="150"/>
  </g>

  <!-- J-INK main text -->
  <text x="150" y="310" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="52" fill="url(#goldGrad)" letter-spacing="3">J-INK</text>

  <!-- Subtitle -->
  <text x="150" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#C9A84C" letter-spacing="2.5">JAPAN INK HYGIENE ASSOCIATION</text>
</svg>
